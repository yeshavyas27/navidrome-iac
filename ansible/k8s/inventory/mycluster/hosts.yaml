all:
  vars:
    jump_host: "FLOATING_IP_HERE"
    ansible_ssh_private_key_file: "~/.ssh/id_rsa_chameleon"
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no"
    ansible_become: true
    ansible_become_method: sudo
  hosts:
    node1:
      ansible_host: "{{ jump_host }}"
      ansible_user: cc
      ip: 192.168.1.11
      access_ip: 192.168.1.11
  children:
    kube_control_plane:
      hosts:
        node1:
    kube_node:
      hosts:
        node1:
    etcd:
      hosts:
        node1:
    k8s_cluster:
      children:
        kube_control_plane:
        kube_node:
    calico_rr:
      hosts: {}
