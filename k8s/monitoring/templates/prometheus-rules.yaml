apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: {{ .Values.namespace }}
data:
  alert-rules.yml: |
    groups:
      - name: infrastructure.rules
        interval: {{ .Values.prometheus.evaluationInterval }}
        rules:
          # Node health alerts
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            annotations:
              summary: "Node {{ $labels.node }} is not ready"
              description: "Node {{ $labels.node }} has been unready for more than 5 minutes."
          
          - alert: NodeMemoryPressure
            expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
            for: 5m
            annotations:
              summary: "Node {{ $labels.node }} has memory pressure"
              description: "Node {{ $labels.node }} is experiencing memory pressure."
          
          - alert: NodeDiskPressure
            expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
            for: 5m
            annotations:
              summary: "Node {{ $labels.node }} has disk pressure"
              description: "Node {{ $labels.node }} is experiencing disk pressure."
          
          # CPU and Memory alerts
          - alert: PodMemoryUsageHigh
            expr: |
              (sum(container_memory_working_set_bytes{pod!=""}) by (namespace, pod) 
              / sum(container_spec_memory_limit_bytes{pod!=""}) by (namespace, pod)) > 0.9
            for: 5m
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} memory usage is high"
              description: "Memory usage is {{ $value | humanizePercentage }} of limit"
          
          - alert: PodCPUUsageHigh
            expr: |
              (sum(rate(container_cpu_usage_seconds_total{pod!=""}[5m])) by (namespace, pod) 
              / sum(container_spec_cpu_quota{pod!=""}/container_spec_cpu_period{pod!=""}) by (namespace, pod)) > 0.8
            for: 10m
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} CPU usage is high"
              description: "CPU usage is {{ $value | humanizePercentage }} of limit"
          
          # Pod restart alerts
          - alert: PodRestartingTooOften
            expr: |
              rate(kube_pod_container_status_restarts_total{pod!=""}[1h]) > 0.1
            for: 5m
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is restarting frequently"
              description: "Pod has restarted {{ $value }} times per hour."
          
          # PVC alerts
          - alert: PersistentVolumeUsageHigh
            expr: |
              (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
            for: 5m
            annotations:
              summary: "PVC {{ $labels.persistentvolumeclaim }} is {{ $value | humanizePercentage }} full"
              description: "Persistent volume {{ $labels.persistentvolumeclaim }} in namespace {{ $labels.namespace }} is {{ $value | humanizePercentage }} full."
          
          # Deployment replica alerts
          - alert: DeploymentReplicasMismatch
            expr: |
              kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 10m
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} replicas mismatch"
              description: "Deployment has {{ $value }} available replicas but {{ $labels.spec_replicas }} desired."
          
          # Service availability
          - alert: ServiceDown
            expr: |
              up{job=~"kubernetes.*"} == 0
            for: 5m
            annotations:
              summary: "Service {{ $labels.job }} is down"
              description: "Service {{ $labels.job }} instance {{ $labels.instance }} is down."
          
          # GPU alerts (if GPU nodes are present)
          - alert: GPUMemoryHigh
            expr: |
              nvidia_gpu_memory_used_mb / nvidia_gpu_memory_total_mb > 0.85
            for: 5m
            annotations:
              summary: "GPU {{ $labels.gpu }} memory usage is high"
              description: "GPU {{ $labels.gpu }} memory usage is {{ $value | humanizePercentage }} of total."
          
          - alert: GPUUtilizationHigh
            expr: |
              nvidia_gpu_utilization_percent > 95
            for: 10m
            annotations:
              summary: "GPU {{ $labels.gpu }} utilization is high"
              description: "GPU {{ $labels.gpu }} utilization is {{ $value }}% for more than 10 minutes."
