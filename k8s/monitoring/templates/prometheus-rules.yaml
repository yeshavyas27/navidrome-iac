apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: {{ .Values.namespace }}
data:
  alert-rules.yml: |
    groups:
      - name: infrastructure.rules
        interval: {{ .Values.prometheus.evaluationInterval }}
        rules:
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            annotations:
              summary: "Node not ready"

          - alert: NodeMemoryPressure
            expr: kube_node_status_condition{condition="MemoryPressure",status="true"} == 1
            for: 5m
            annotations:
              summary: "Node has memory pressure"

          - alert: NodeDiskPressure
            expr: kube_node_status_condition{condition="DiskPressure",status="true"} == 1
            for: 5m
            annotations:
              summary: "Node has disk pressure"

          - alert: PodMemoryUsageHigh
            expr: |
              (sum(container_memory_working_set_bytes{pod!=""}) by (namespace, pod)
              / sum(container_spec_memory_limit_bytes{pod!=""}) by (namespace, pod)) > 0.9
            for: 5m
            annotations:
              summary: "Pod memory usage above 90 percent of limit"

          - alert: PodCPUUsageHigh
            expr: |
              (sum(rate(container_cpu_usage_seconds_total{pod!=""}[5m])) by (namespace, pod)
              / sum(container_spec_cpu_quota{pod!=""}/container_spec_cpu_period{pod!=""}) by (namespace, pod)) > 0.8
            for: 10m
            annotations:
              summary: "Pod CPU usage above 80 percent of limit"

          - alert: PodRestartingTooOften
            expr: rate(kube_pod_container_status_restarts_total{pod!=""}[1h]) > 0.1
            for: 5m
            annotations:
              summary: "Pod restarting frequently"

          - alert: PersistentVolumeUsageHigh
            expr: (kubelet_volume_stats_used_bytes / kubelet_volume_stats_capacity_bytes) > 0.85
            for: 5m
            annotations:
              summary: "PVC usage above 85 percent"

          - alert: DeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 10m
            annotations:
              summary: "Deployment replicas mismatch"

          - alert: ServiceDown
            expr: up{job=~"kubernetes.*"} == 0
            for: 5m
            annotations:
              summary: "Service target is down"

          - alert: GPUMemoryHigh
            expr: nvidia_gpu_memory_used_mb / nvidia_gpu_memory_total_mb > 0.85
            for: 5m
            annotations:
              summary: "GPU memory usage above 85 percent"

          - alert: GPUUtilizationHigh
            expr: nvidia_gpu_utilization_percent > 95
            for: 10m
            annotations:
              summary: "GPU utilization above 95 percent for 10 minutes"

      # Serving-layer SLO + rollback-trigger rules. Justified in
      # navidrome-recommendations/TRIGGERS.md. Metrics come from
      # navidrome-serve /metrics endpoint (Prometheus client in app.py).
      - name: serving.rules
        interval: {{ .Values.prometheus.evaluationInterval }}
        rules:
          # ─── hard rollback: fire, review, execute scripts/rollback.sh ──
          - alert: ServingErrorRateCritical
            expr: rate(recommend_requests_total{status="500"}[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
              service: navidrome-serve
              action: rollback
            annotations:
              summary: "navidrome-serve 500-rate > 5% for 5m"
              description: "Error rate past UX-breaking threshold. Review pod logs, then consider rolling back via scripts/rollback.sh."

          - alert: ServingLatencyP95Critical
            expr: histogram_quantile(0.95, rate(recommend_latency_seconds_bucket[5m])) > 1.0
            for: 5m
            labels:
              severity: critical
              service: navidrome-serve
              action: rollback
            annotations:
              summary: "navidrome-serve p95 latency > 1s for 5m"
              description: "Latency past 4x SLO. Likely a bad model or runaway inference. Candidate for rollback."

          # ─── soft rollback: investigate before rolling back ──
          - alert: ColdStartSurge
            expr: |
              rate(recommend_cold_start_activations_total[10m])
                / rate(recommend_requests_total[10m]) > 0.30
            for: 10m
            labels:
              severity: warning
              service: navidrome-serve
            annotations:
              summary: "Cold-start fallback firing on > 30% of requests"
              description: "Model vocab may have drifted from the library. Check track-id mapping pipeline; rollback if confirmed."

          - alert: OOVRateHigh
            expr: |
              rate(recommend_oov_items_total[10m])
                / rate(recommend_requests_total[10m]) > 5
            for: 10m
            labels:
              severity: warning
              service: navidrome-serve
            annotations:
              summary: "OOV items per request > 5 for 10m"
              description: "Request pipeline may be sending UUIDs instead of 30Music track_ids. Check Go handler + enrichment ingest."

          - alert: PlayCacheHitRateLow
            expr: |
              rate(play_cache_hits_total[30m])
                / (rate(play_cache_hits_total[30m]) + rate(play_cache_misses_total[30m])) < 0.3
            for: 30m
            labels:
              severity: warning
              service: navidrome-serve
            annotations:
              summary: "/play cache hit rate < 30% for 30m"
              description: "Audio cache may have been wiped or warmup didn't populate. Doesn't trigger model rollback; fixes the cache."

          - alert: NavidromeServeDown
            expr: up{app="navidrome-serve"} == 0
            for: 2m
            labels:
              severity: critical
              service: navidrome-serve
            annotations:
              summary: "navidrome-serve /metrics endpoint unreachable"
              description: "Pod crashed, unschedulable, or Prometheus scrape config broken."

      # Training-side safeguard signals, pushed to Prometheus pushgateway
      # by train/finetune_gru4rec.py after each run. See that file's
      # push_safeguard_metrics_to_prometheus() for how the gauges are emitted.
      - name: training.rules
        interval: {{ .Values.prometheus.evaluationInterval }}
        rules:
          - alert: FinetuneRegression
            expr: gru4rec_safeguard_hr_delta < -0.05
            for: 0m
            labels:
              severity: warning
              service: training
              action: review
            annotations:
              summary: "Last finetune dropped HR@10 > 5pp vs previous best"
              description: "Review the latest MLflow finetune run; candidate for rollback to prior model key. mlflow_run_id and data_version are included as alert labels."

          - alert: FinetuneDataQualityFailed
            expr: gru4rec_safeguard_data_quality_passed == 0
            for: 0m
            labels:
              severity: warning
              service: training
            annotations:
              summary: "Finetune run flagged data-quality issues"
              description: "Finetune failed session-length or item-frequency checks. Possible data poisoning or distribution drift. See alert labels for data_version and mlflow_run_id."

          - alert: PopularityConcentrationHigh
            expr: gru4rec_safeguard_popularity_share > 0.7
            for: 10m
            labels:
              severity: warning
              service: training
            annotations:
              summary: "> 70% of training interactions in top-10% items"
              description: "Feedback-loop drift: recs -> plays -> retrain on plays -> more of same. Investigate recommendation diversity."
