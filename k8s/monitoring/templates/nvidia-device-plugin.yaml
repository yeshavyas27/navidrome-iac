apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: kube-system
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      tolerations:
        # This toleration allows the daemonset to run on GPU nodes
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      # Only run on nodes with GPUs
      nodeSelector:
        gpu: "true"
      priorityClassName: system-node-critical
      containers:
        - image: nvcr.io/nvidia/k8s-device-plugin:v0.17.0
          name: nvidia-device-plugin-ctr
          args:
            - "--fail-on-init-error=false"
            - "--pass-unsupported-proc=true"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: device-metrics
              mountPath: /run/prometheus
      volumes:
        - name: device-metrics
          emptyDir: {}
---
# Kubernetes 1.28+ optional: GPUClassParameters (for advanced resource control)
apiVersion: v1
kind: ConfigMap
metadata:
  name: nvidia-device-plugin-config
  namespace: kube-system
data:
  any: |
    sharing:
      timeSlicing:
        replicas: 4
      failOnInitError: false
