apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: {{ .Values.namespace }}
  labels:
    app: pushgateway
spec:
  replicas: {{ .Values.pushgateway.replicas }}
  selector:
    matchLabels:
      app: pushgateway
  template:
    metadata:
      labels:
        app: pushgateway
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '{{ .Values.pushgateway.port }}'
    spec:
      containers:
        - name: pushgateway
          image: {{ .Values.pushgateway.image }}
          ports:
            - containerPort: {{ .Values.pushgateway.port }}
              name: http
          resources:
            requests:
              cpu: {{ .Values.pushgateway.resources.requests.cpu }}
              memory: {{ .Values.pushgateway.resources.requests.memory }}
            limits:
              cpu: {{ .Values.pushgateway.resources.limits.cpu }}
              memory: {{ .Values.pushgateway.resources.limits.memory }}
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: {{ .Values.pushgateway.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /-/ready
              port: {{ .Values.pushgateway.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: {{ .Values.namespace }}
  labels:
    app: pushgateway
spec:
  type: NodePort
  selector:
    app: pushgateway
  ports:
    - port: {{ .Values.pushgateway.port }}
      targetPort: {{ .Values.pushgateway.port }}
      nodePort: {{ .Values.pushgateway.nodePort }}
      protocol: TCP
      name: http