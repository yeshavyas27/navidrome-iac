apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: navidrome-serve-hpa
  namespace: navidrome-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: navidrome-serve
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
