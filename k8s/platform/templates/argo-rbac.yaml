# RBAC for Argo service accounts that need to manage deployments.
#
# Bound to both:
#   - argo-workflow  (used by cron-finetune and explicitly-serviceAccountName'd workflows)
#   - default        (used by ad-hoc / CI-triggered workflows that don't set serviceAccountName)
#
# Permissions needed:
#   - kubectl set env / kubectl rollout status on navidrome-serve (navidrome-platform ns)
#   - kubectl get/patch deployments for restart-deployment steps
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: finetune-deploy
rules:
  # Read + patch deployments (needed by `kubectl set env` and `kubectl rollout status`)
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch", "update"]
  # `kubectl rollout status` watches the ReplicaSet underneath
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  # Needed by `kubectl rollout status` to watch pod state
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: argo-workflow-finetune-deploy
subjects:
  - kind: ServiceAccount
    name: argo-workflow
    namespace: argo
roleRef:
  kind: ClusterRole
  name: finetune-deploy
  apiGroup: rbac.authorization.k8s.io
